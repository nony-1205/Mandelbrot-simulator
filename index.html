<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Set Simulator</title>
    <link rel="stylesheet" href="styles.css">

</head>


<body>
    <div id="mandelbrot-container">
        <canvas id="mandelbrot"></canvas>
    </div>
    <div id="sidebar">
        <div id="julia-container">
            <canvas id="julia"></canvas>
        </div>
        <div id="info">
            <p>Coordinates at pointer: </p>
            <p>Re: <span id= 'info-re'></span></p>
            <p>Im: <span id="info-im"></span></p>
            <p>Zoom: <span id="info-zoom"></span></p>
            <button id="animate">Animate</button>
        </div>
    </div>
</body>

<script src="fractals.js"></script>
</html>
